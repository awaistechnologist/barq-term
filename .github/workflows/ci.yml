name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (macOS arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: ./scripts/test.sh

      - name: Bundle app
        run: ./scripts/make-app.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Barq.app
          path: dist/
          retention-days: 14
