<svg width="1000" height="620" viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, SF Pro Text, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16161f"/><stop offset="1" stop-color="#11101a"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd45a"/><stop offset="1" stop-color="#fb9e14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- window -->
  <g filter="url(#shadow)">
    <rect x="24" y="20" width="952" height="576" rx="14" fill="#333446"/>
    <!-- top bar -->
    <rect x="24" y="20" width="952" height="44" rx="14" fill="#333446"/>
    <rect x="24" y="50" width="952" height="14" fill="#333446"/>
    <line x1="24" y1="64" x2="976" y2="64" stroke="#cdd6f4" stroke-opacity="0.09"/>
    <!-- traffic lights -->
    <circle cx="46" cy="42" r="6" fill="#ff5f57"/><circle cx="66" cy="42" r="6" fill="#febc2e"/><circle cx="86" cy="42" r="6" fill="#28c840"/>
    <!-- wordmark -->
    <text x="108" y="47" font-size="14" font-weight="700" fill="#ffc738">⚡</text>
    <text x="126" y="47" font-size="14" font-weight="700" fill="#e6e9f5">Barq</text>
    <!-- right controls -->
    <text x="872" y="48" font-size="15" fill="#8b90a6">▤</text>
    <text x="902" y="48" font-size="15" fill="#ffc738">✦</text>
    <text x="930" y="48" font-size="17" fill="#8b90a6">+</text>
    <text x="956" y="48" font-size="15" fill="#8b90a6">⋯</text>

    <!-- sidebar -->
    <rect x="24" y="64" width="236" height="532" fill="#2b2c3c"/>
    <line x1="260" y1="64" x2="260" y2="596" stroke="#cdd6f4" stroke-opacity="0.09"/>
    <rect x="40" y="82" width="176" height="30" rx="8" fill="#ffffff" fill-opacity="0.06"/>
    <text x="54" y="101" font-size="12" fill="#cdd6f4" fill-opacity="0.4">Search hosts</text>
    <rect x="222" y="82" width="24" height="30" rx="7" fill="#ffffff" fill-opacity="0.06"/>
    <text x="230" y="102" font-size="14" fill="#8b90a6">+</text>

    <!-- LOCAL group -->
    <text x="44" y="140" font-size="10" font-weight="700" fill="#cdd6f4" fill-opacity="0.35" letter-spacing="1">LOCAL</text>
    <rect x="36" y="150" width="212" height="34" rx="8" fill="#cdd6f4" fill-opacity="0.06"/>
    <text x="50" y="171" font-size="12.5" fill="#cdd6f4">▸_ Local</text>
    <rect x="212" y="159" width="24" height="16" rx="8" fill="#cdd6f4" fill-opacity="0.10"/>
    <text x="217" y="171" font-size="9" font-weight="700" fill="#cdd6f4" fill-opacity="0.4">AI</text>

    <!-- WORK group -->
    <text x="44" y="210" font-size="10" font-weight="700" fill="#cdd6f4" fill-opacity="0.35" letter-spacing="1">WORK</text>
    <text x="50" y="240" font-size="12.5" fill="#cdd6f4">🖧 web-1</text>
    <text x="50" y="256" font-size="10.5" fill="#cdd6f4" fill-opacity="0.35">deploy@10.0.0.11</text>
    <rect x="210" y="230" width="26" height="16" rx="8" fill="#ffc738"/>
    <text x="215" y="242" font-size="9" font-weight="700" fill="#1e1e2e">AI</text>
    <text x="50" y="288" font-size="12.5" fill="#cdd6f4">🖧 db-primary</text>
    <text x="50" y="304" font-size="10.5" fill="#cdd6f4" fill-opacity="0.35">ops@10.0.0.20</text>

    <!-- LAB group -->
    <text x="44" y="344" font-size="10" font-weight="700" fill="#cdd6f4" fill-opacity="0.35" letter-spacing="1">LAB</text>
    <text x="50" y="374" font-size="12.5" fill="#cdd6f4">▦ lab-router</text>
    <text x="50" y="390" font-size="10.5" fill="#cdd6f4" fill-opacity="0.35">pi@192.168.2.1</text>
    <rect x="210" y="364" width="26" height="16" rx="8" fill="#ffc738"/>
    <text x="215" y="376" font-size="9" font-weight="700" fill="#1e1e2e">AI</text>

    <!-- HOME content: greeting + omni-bar + machine cards -->
    <g>
      <rect x="290" y="70" width="34" height="34" rx="9" fill="url(#badge)"/>
      <text x="298" y="95" font-size="20" font-weight="800" fill="#1e1e2e">⚡</text>
      <text x="336" y="98" font-size="27" font-weight="800" fill="#e6e9f5">Good afternoon.</text>
      <text x="290" y="126" font-size="13.5" fill="#cdd6f4" fill-opacity="0.6">What do you want to do? Type a command, a host, or just ask.</text>

      <!-- omni-bar -->
      <rect x="290" y="150" width="650" height="52" rx="14" fill="#333446" stroke="#ffc738" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="312" y="182" font-size="18" font-weight="700" fill="#ffc738">›</text>
      <text x="336" y="182" font-size="16" fill="#cdd6f4" fill-opacity="0.45">Ask, run a command, or connect to a host…</text>
      <rect x="902" y="164" width="24" height="24" rx="6" fill="#cdd6f4" fill-opacity="0.06"/>
      <text x="908" y="181" font-size="11" fill="#cdd6f4" fill-opacity="0.4">⏎</text>

      <text x="290" y="246" font-size="11" font-weight="700" fill="#cdd6f4" fill-opacity="0.35" letter-spacing="1">YOUR MACHINES</text>
      <!-- cards -->
      <g>
        <rect x="290" y="262" width="200" height="96" rx="12" fill="#333446" stroke="#cdd6f4" stroke-opacity="0.09"/>
        <text x="306" y="288" font-size="14" fill="#8b90a6">▸_</text>
        <text x="306" y="316" font-size="14" font-weight="600" fill="#e6e9f5">Local</text>
        <text x="306" y="334" font-size="11.5" fill="#cdd6f4" fill-opacity="0.35">~</text>
        <rect x="306" y="342" width="46" height="15" rx="4" fill="#ffffff" fill-opacity="0.06"/>
        <text x="312" y="353" font-size="9" font-weight="700" fill="#cdd6f4" fill-opacity="0.6">LOCAL</text>
      </g>
      <g>
        <rect x="502" y="262" width="200" height="96" rx="12" fill="#333446" stroke="#ffc738" stroke-opacity="0.4"/>
        <text x="518" y="288" font-size="14" fill="#8b90a6">🖧</text>
        <rect x="662" y="276" width="26" height="16" rx="8" fill="#ffc738"/>
        <text x="667" y="288" font-size="9" font-weight="700" fill="#1e1e2e">AI</text>
        <text x="518" y="316" font-size="14" font-weight="600" fill="#e6e9f5">web-1</text>
        <text x="518" y="334" font-size="11.5" fill="#cdd6f4" fill-opacity="0.35">deploy@10.0.0.11</text>
        <rect x="518" y="342" width="40" height="15" rx="4" fill="#ffffff" fill-opacity="0.06"/>
        <text x="524" y="353" font-size="9" font-weight="700" fill="#cdd6f4" fill-opacity="0.6">WORK</text>
      </g>
      <g>
        <rect x="714" y="262" width="200" height="96" rx="12" fill="none" stroke="#cdd6f4" stroke-opacity="0.16" stroke-dasharray="4 4"/>
        <text x="800" y="312" font-size="18" fill="#cdd6f4" fill-opacity="0.35">+</text>
        <text x="778" y="332" font-size="12" fill="#cdd6f4" fill-opacity="0.35">Add host</text>
      </g>

      <text x="290" y="400" font-size="11" font-weight="700" fill="#cdd6f4" fill-opacity="0.35" letter-spacing="1">JUMP BACK IN</text>
      <rect x="290" y="412" width="150" height="34" rx="9" fill="#333446" stroke="#cdd6f4" stroke-opacity="0.09"/>
      <text x="306" y="433" font-size="12" fill="#cdd6f4" fill-opacity="0.6">↺ deploy@web-1</text>
      <rect x="452" y="412" width="140" height="34" rx="9" fill="#333446" stroke="#cdd6f4" stroke-opacity="0.09"/>
      <text x="468" y="433" font-size="12" fill="#cdd6f4" fill-opacity="0.6">↺ pi@lab-router</text>

      <text x="290" y="560" font-size="12" fill="#cdd6f4" fill-opacity="0.28">MCP-native · Context Vault · local-first AI (Ollama) — برق, lightning for your machines</text>
    </g>
  </g>
</svg>
